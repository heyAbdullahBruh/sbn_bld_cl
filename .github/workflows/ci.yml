name: Vite React CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 3. Install dependencies
      - name: Install Dependencies
        run: bun install

      # 4. Run Linter (optional but recommended)
      - name: Run Lint
        run: bun run lint || true

      # 5. Build Project
      - name: Build Project
        run: bun run build

      # 6. Preview build (optional safety)
      - name: Check Build Output
        run: ls -la dist
